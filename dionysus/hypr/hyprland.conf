# ──────────────────────────────────────────────────────────────────────────
#  °˖* ૮(  • ᴗ ｡)っ🍸  pewdiepie/archdaemon/dionysh shhheersh
#  Hyprland config 
#  vers. 1.0
# ──────────────────────────────────────────────────────────────────────────

# ── MONITORS ───────────────────────────────────────────────────────────────
monitor = eDP-1, preferred, 0x0, 1.0
monitor = DP-3, preferred, -1920x-500, 1.0

# ── MY PROGRAMS ────────────────────────────────────────────────────────────
$terminal    = alacritty
$fileManager = thunar
$menu        = rofi

# ── AUTOSTART ──────────────────────────────────────────────────────────────

exec-once = ~/.config/hypr/scripts/waybar_watcher.sh &

# FIREFOX PRELOAD - fast firefox bööt, just hide workspace 9.
exec-once = hyprctl dispatch exec '[workspace 9 silent] firefox --new-instance --profile ~/.mozilla/firefox/xk2sxifi.default-release --new-window about:blank'

# EWW SCRIPTS
exec-once = ~/.config/eww/scripts/audio/audio_visualizer.py &
exec-once = cava -p ~/.config/cava/config &

# ROFI image cache
exec-once = cp ~/.config/rofi/image.png /dev/shm/rofi_image.png


# ── ENVIRONMENT VARIABLES ──────────────────────────────────────────────────
env = XCURSOR_SIZE,16
env = HYPRCURSOR_SIZE,16
env = XDG_CURRENT_DESKTOP,Hyprland
env = GDK_DPI_SCALE,1.0
env = XFT_DPI,96
env = XFT_FONT,GohuFont-11

# ── LOOK AND FEEL ──────────────────────────────────────────────────────────
general {
    col.active_border   = rgba(9cdef2ff)
    col.inactive_border = rgba(444444ff)
    gaps_in             = 5
    gaps_out            = 10
    border_size         = 1

    col.active_border   = rgba(61afefff)   # Blue for focused windows
    col.inactive_border = rgba(444444ff)

    resize_on_border = false
    allow_tearing    = false
    layout           = dwindle
}

# ── DECORATION ─────────────────────────────────────────────────────────────
decoration {
    rounding       = 1
    rounding_power = 2

    active_opacity   = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled      = true
        range        = 5
        render_power = 4
        color        = rgba(1fbeffee)
    }

    blur {
        size        = 2
        passes      = 1
        brightness  = 0.4
    }
}

# ── ANIMATIONS ─────────────────────────────────────────────────────────────
animations {
    enabled = yes, please :)

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

# ── LAYOUTS ────────────────────────────────────────────────────────────────
dwindle {
    pseudotile     = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo   = true
}

# ── INPUT ──────────────────────────────────────────────────────────────────
input {
    kb_layout  = us,
    kb_variant =
    kb_model   =
    kb_options =
    kb_rules   =

    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll = true
	scroll_factor = 0.5
    }
}

#gesture = 3, swipe, workspace

# ── KEYBINDINGS ────────────────────────────────────────────────────────────
$mainMod = SUPER SHIFT
$mod     = SUPER

# Apps
bind = $mod, T, exec, $terminal
bind = $mod, B, exec, brave 
bind = $mod, F, exec, thunar
bind = $mod, W, killactive,
bind = $mod, V, togglefloating,
bind = $mod, {, pseudo,
bind = $mod, J, togglesplit,
bind = ALT, SPACE, exec, rofi -show drun

# Move focus
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

# Screenshot
bind = ALT, P, exec, slurp | tee >(grim -g "$(cat)" "$HOME/Pictures/Screenshots/screenshot-$(date +'%Y-%m-%d-%H%M%S').png") | grim -g "$(cat)" - | wl-copy

# Function keys
bind = , XF86KbdBrightnessDown, exec, bash ~/.config/kbd-brightness.sh down
bind = , XF86KbdBrightnessUp,   exec, bash ~/.config/kbd-brightness.sh up
bind = , XF86Launch3,           exec, bash ~/.config/kbd-breathing.sh
exec-once = bash ~/.config/kbd-brightness.sh &
bind = , XF86Launch4, exec, ~/.config/hypr/scripts/asus-kbd/cycle-profile.s

# Touchpad / Monitor
bind = , XF86Display,       exec, hyprctl dispatch cyclenextmonitor
bind = , XF86Launch1,       exec, ~/.config/hyprlock/lock.sh

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 9, workspace, 9 #Kept hidden as "workspace for background tasks".

bind = $mainMod, 1, movetoworkspace, 1
bind = $mainMod, 2, movetoworkspace, 2
bind = $mainMod, 3, movetoworkspace, 3
bind = $mainMod, 4, movetoworkspace, 4
bind = $mainMod, 9, movetoworkspace, 9

bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Multimedia keys
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp,  exec, brightnessctl s 10%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 10%-

bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPrev,  exec, playerctl previous

# ── ASUS KEYBOARD SCRIPTS ──────────────────────────────────────────────────
bind = , XF86KbdBrightnessUp,   exec, ~/.config/hypr/scripts/asus-kbd/kbd-brightness.sh up
bind = , XF86KbdBrightnessDown, exec, ~/.config/hypr/scripts/asus-kbd/kbd-brightness.sh down
bind = , XF86Launch3,           exec, ~/.config/hypr/scripts/asus-kbd/kbd-breathing.sh
bind = , XF86Launch4,           exec, ~/.config/hypr/scripts/asus-kbd/cycle-profile.sh

# ── WINDOWS AND WORKSPACES ────────────────────────────────────────────────
windowrule = suppress_event maximize, match:class = .*
windowrule = match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0, no_focus 1
windowrule = match:class ^(eww)$, no_focus 1 

workspace=1,persistent:true
workspace=2,persistent:true
workspace=3,persistent:true
workspace=4,persistent:true
workspace=9,persistent:true

workspace=1,monitor:eDP-1
workspace=2,monitor:eDP-1
workspace=3,monitor:eDP-1
workspace=4,monitor:eDP-1
workspace=9,monitor:eDP-1

# ── GLOBAL DARK THEME FOR APPS ────────────────────────────────────────────────
#for libadwaita gtk4 apps you can use this command:
exec = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"   # for GTK4 apps

#for gtk3 apps you need to install adw-gtk3 theme (in arch linux sudo pacman -S adw-gtk-theme)
exec = gsettings set org.gnome.desktop.interface gtk-theme "adw-gtk3"   # for GTK3 apps

#for kde apps you need to install: sudo pacman -S qt5ct qt6ct kvantum kvantum breeze-icons   
#you will need to set dark theme for qt apps from kde more difficult thans with gnome :D:
env = QT_QPA_PLATFORMTHEME,qt6ct   # for Qt apps# Theme
